<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNAKE GAME</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    
    
    <div id="header">

    <div class="score">
        <span class="label">Score:</span>
        <span class="value">0</span>
    </div>

    <div class="title">
        <h1>SNAKE GAME</h1>
    </div>

    <div class="time">
        <span class="label">Time:</span>
        <span class="value">00:00</span>
    </div>

</div>
    <div class="canvas-wrapper">

    <div id="gameOverOverlay" class="hidden">
        <div class="overlay-content">
            <h2 id="overlayTitle">Game Over</h2>

            <div id="quitOverlay" class="hidden">
  <div class="overlay-content">
    <h2>Are you sure you want to quit?</h2>
    <button id="confirmQuit">Quit</button>
    <button id="continueGame">Keep Playing</button>
  </div>
</div>

            <p class="overlay-score">
                Score: <span id="finalScore">0</span>
            </p>

            <p class="overlay-score">
                High Score: <span id="finalHighScore">0</span>
            </p>

            <button id="restartBtn">Restart</button>
        </div>
    </div>

    <canvas id="bgCanvas"></canvas>
    <canvas id="gameCanvas"></canvas>

</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/noisejs/2.1.0/perlin.min.js"></script>
    
    <script src="canvas.js?v=2"></script>
</body>
</html>
