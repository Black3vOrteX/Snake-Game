<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Login</title>
<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Courier New', monospace;

  background: radial-gradient(circle at center,
      #111827 0%,
      #0b1120 60%,
      #05080f 100%);
}

/* ===== Floating Neon Bubbles ===== */

.bubbles {
  position: fixed;
  width: 100%;
  height: 100%;
  overflow: hidden;
  z-index: 0;
}

.bubbles span {
  position: absolute;
  bottom: -100px;
  border-radius: 50%;
  background: rgba(94, 234, 212, 0.25);
  box-shadow:
    0 0 10px rgba(94,234,212,0.4),
    0 0 20px rgba(94,234,212,0.3);
  animation: floatUp linear infinite, pulseGlow 3s ease-in-out infinite;
}

@keyframes floatUp {
  0% {
    transform: translate(0, 0);
    opacity: 0.6;
  }
  100% {
    transform: translate(20px, -120vh);
    opacity: 0;
  }
}




/* Subtle glow pulse */
@keyframes pulseGlow {
  0% { box-shadow: 0 0 8px rgba(94,234,212,0.3); }
  50% { box-shadow:
          0 0 20px rgba(94,234,212,0.7),
          0 0 40px rgba(94,234,212,0.4); }
  100% { box-shadow: 0 0 8px rgba(94,234,212,0.3); }
}

/* ===== Neon Title ===== */

.neon-title {
  position: absolute;
  top: 12vh;
  font-size: clamp(28px, 6vw, 42px);
  letter-spacing: clamp(3px, 1vw, 6px);
  color: #5eead4;
  text-shadow:
    0 0 8px #5eead4,
    0 0 18px #5eead4,
    0 0 30px #00cc88;
  animation: titlePulse 2.5s ease-in-out infinite;
  z-index: 2;
}

@keyframes titlePulse {
  0% { text-shadow: 0 0 10px #5eead4; }
  50% {
    text-shadow:
      0 0 25px #5eead4,
      0 0 50px #00cc88;
  }
  100% { text-shadow: 0 0 10px #5eead4; }
}

/* ===== Login Box ===== */

.login-box {
  width: 90%;
  max-width: 340px;
  padding: 35px;
  border-radius: 20px;
  background: rgba(17, 24, 39, 0.9);
  backdrop-filter: blur(12px);
  box-shadow:
      0 0 20px rgba(94, 234, 212, 0.4),
      0 0 40px rgba(94, 234, 212, 0.2);
  color: #5eead4;
  position: relative;
  z-index: 2;
  text-align: center;
}

.input-box input {
  width: 100%;
  padding: 12px;
  border: none;
  border-bottom: 2px solid #5eead4;
  background: transparent;
  outline: none;
  font-size: 16px;
  color: white;
  margin-bottom: 25px;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: #00cc88;
  color: white;
  font-size: 16px;
  cursor: pointer;
  box-shadow: 0 0 15px #00cc88;
}

button:hover {
  background: #00e6a0;
}

@media (max-height: 700px) {
  .neon-title {
    top: 8vh;
  }

  .login-box {
    padding: 25px;
  }
}
</style>
</head>

<body>
<div class="bubbles">
  <span style="left:5%; width:15px; height:15px; animation-duration:8s;"></span>
  <span style="left:15%; width:25px; height:25px; animation-duration:10s;"></span>
  <span style="left:30%; width:18px; height:18px; animation-duration:7s;"></span>
  <span style="left:45%; width:30px; height:30px; animation-duration:11s;"></span>
  <span style="left:60%; width:20px; height:20px; animation-duration:9s;"></span>
  <span style="left:75%; width:22px; height:22px; animation-duration:8s;"></span>
  <span style="left:90%; width:16px; height:16px; animation-duration:6s;"></span>
</div>

<div class="neon-title">SNAKE GAME</div>
<div class="login-box">
  <h2>Login</h2>

  <form action="game/index.html" method="get">
    <div class="input-box">
      <input type="text" placeholder="Username" required>
    </div>

    <button type="submit">Start Game</button>
  </form>

</div>
<script>
  const form = document.querySelector("form");

  form.addEventListener("submit", function (e) {
    e.preventDefault(); // stop normal form navigation
    window.location.replace("game/index.html");
  });
</script>
</body>
</html>
