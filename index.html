<!DOCTYPE html>
<html>
<head>
<title>Game Login</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  background: url("assets/backgam.jpeg") no-repeat center center/cover;
}

.login-box {
  width: 350px;
  padding: 40px;
  border-radius: 20px;
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(15px);
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);
  color: #000;
  position: relative;
}

.login-box h2 {
  text-align: center;
  margin-bottom: 30px;
}

.input-box {
  margin-bottom: 20px;
}

.input-box input {
  width: 100%;
  padding: 10px;
  border: none;
  border-bottom: 2px solid #333;
  background: transparent;
  outline: none;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #1e3c72;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #16325c;
}
</style>
</head>

<body>

<div class="login-box">
  <h2>Login</h2>

  <form action="game/index.html" method="get">
    <div class="input-box">
      <input type="text" placeholder="Username" required>
    </div>

    <button type="submit">Start Game</button>
  </form>

</div>

</body>
</html>
